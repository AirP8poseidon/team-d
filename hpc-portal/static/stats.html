<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사용량 통계 — 사내 HPC 포털</title>
  <link rel="stylesheet" href="/static/common.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:18px 0 22px;}
    .kpi{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:14px 16px;}
    .kpi .label{font-size:.78rem;color:var(--muted);margin-bottom:4px;}
    .kpi .value{font-size:1.5rem;font-weight:700;}
    .kpi .value.blue{color:var(--blue);} .kpi .value.green{color:var(--green);} .kpi .value.orange{color:var(--orange);}
    .chart-box{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:16px;}
    .chart-box h3{margin:0 0 10px;font-size:1rem;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    @media(max-width:880px){.grid2{grid-template-columns:1fr;}}

    /* 사용자별 용량 체크 — 기준 시점 버튼 */
    .cap-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:6px;}
    .cap-head h3{margin:0;}
    .cap-btns{display:flex;gap:6px;}
    .cap-btns button{border:1px solid var(--line);background:var(--paper);color:var(--muted);
      padding:6px 12px;border-radius:8px;font-size:.82rem;cursor:pointer;font-family:inherit;}
    .cap-btns button:hover{background:#f1f5f9;}
    .cap-btns button.active{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:600;}
    .cap-sub{color:var(--muted);font-size:.8rem;margin:0 0 10px;}

    /* 사용자별 스토리지 게이지 (쿼터 대비) */
    .gauge{margin:12px 0;}
    .gauge .gl{display:flex;justify-content:space-between;align-items:baseline;font-size:.88rem;margin-bottom:5px;}
    .gauge .gl .gu{font-weight:600;}
    .gauge .gl .gv{color:var(--muted);font-size:.82rem;}
    .gbar{height:14px;background:#e8edf5;border-radius:7px;overflow:hidden;}
    .gbar>span{display:block;height:100%;border-radius:7px;transition:width .6s ease;}
    .gbar .g{background:var(--green);} .gbar .o{background:var(--orange);} .gbar .r{background:var(--red);}
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="container">
    <h1>사용량 통계</h1>
    <p class="subtitle">노드별/사용자별 사용시간(코어·h) 집계 · 추이 · 사용자별 스토리지 용량.</p>

    <div class="kpi-row">
      <div class="kpi"><div class="label">총 사용시간(코어·h)</div><div class="value blue" id="kpi-total">-</div></div>
      <div class="kpi"><div class="label">일평균 사용시간(h)</div><div class="value" id="kpi-avg">-</div></div>
      <div class="kpi"><div class="label">최번일(최대 사용)</div><div class="value orange" id="kpi-peak">-</div></div>
      <div class="kpi"><div class="label">최다 사용자</div><div class="value green" id="kpi-top">-</div></div>
      <div class="kpi"><div class="label">활성 사용자</div><div class="value" id="kpi-users">-</div></div>
      <div class="kpi"><div class="label">사용 노드 수</div><div class="value" id="kpi-nodes">-</div></div>
    </div>

    <div class="chart-box">
      <h3>일자별 사용시간 추이 (최근 1주일)</h3>
      <canvas id="trendChart" height="90"></canvas>
    </div>

    <div class="grid2">
      <div class="chart-box"><h3>노드별 사용시간(코어·h)</h3><canvas id="nodeChart" height="150"></canvas></div>
      <div class="chart-box"><h3>사용자별 사용량 순위</h3><canvas id="userChart" height="150"></canvas></div>
    </div>

    <div class="chart-box">
      <div class="cap-head">
        <h3>사용자별 스토리지 용량</h3>
        <div class="cap-btns" id="cap-btns">
          <button data-k="w1">1주일전</button>
          <button data-k="d3">3일전</button>
          <button data-k="today" class="active">오늘 00시</button>
          <button data-k="now">현재시각</button>
        </div>
      </div>
      <p class="cap-sub" id="cap-sub"></p>
      <div id="capGauges"></div>
    </div>
  </div>

  <script>
    const C={blue:"#1d4ed8",green:"#047857",orange:"#b45309"};
    let nodeChart=null,userChart=null,trendChart=null;

    function makeBar(ctx,labels,data,color,horizontal,unit){
      return new Chart(ctx,{type:"bar",
        data:{labels,datasets:[{label:unit||"사용시간(h)",data,backgroundColor:color,borderRadius:6}]},
        options:{indexAxis:horizontal?"y":"x",responsive:true,plugins:{legend:{display:false}},
          scales:{x:{beginAtZero:true},y:{beginAtZero:true}}}});
    }
    function makeLine(ctx,labels,data){
      return new Chart(ctx,{type:"line",
        data:{labels,datasets:[{label:"사용시간(h)",data,borderColor:C.blue,backgroundColor:"rgba(29,78,216,.12)",fill:true,tension:.3,pointRadius:3}]},
        options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
    }
    const setText=(id,v)=>{document.getElementById(id).textContent=v;};

    // ── 사용량 집계(추이·노드·사용자·KPI) ──
    async function loadUsage(){
      let d; try{ d=await (await fetch("/api/stats/usage")).json(); }catch(e){ return; }
      const s=d.summary||{};
      setText("kpi-total",Number(s.total??0).toFixed(1));
      setText("kpi-avg",Number(s.avgPerDay??0).toFixed(1));
      setText("kpi-peak",s.peakDay?s.peakDay.slice(5):"-");
      setText("kpi-top",d.by_user.length?d.by_user[0].user:"-");
      setText("kpi-users",s.activeUsers??0);
      setText("kpi-nodes",s.activeNodes??0);

      const nL=d.by_node.map(x=>x.node), nD=d.by_node.map(x=>x.gpu_hours);
      const uL=d.by_user.map(x=>x.user), uD=d.by_user.map(x=>x.gpu_hours);
      const tL=d.trend.map(x=>x.day.slice(5)), tD=d.trend.map(x=>x.gpu_hours);
      if(!nodeChart){
        nodeChart=makeBar(document.getElementById("nodeChart"),nL,nD,C.green,false);
        userChart=makeBar(document.getElementById("userChart"),uL,uD,C.orange,true);
        trendChart=makeLine(document.getElementById("trendChart"),tL,tD);
      }else{
        nodeChart.data.labels=nL; nodeChart.data.datasets[0].data=nD; nodeChart.update("none");
        userChart.data.labels=uL; userChart.data.datasets[0].data=uD; userChart.update("none");
        trendChart.data.labels=tL; trendChart.data.datasets[0].data=tD; trendChart.update("none");
      }
    }

    // ── 사용자별 스토리지 용량(기준 시점 버튼) — 쿼터 대비 직관적 게이지 ──
    let capData={}, curCap="today";
    const capCls = p => p>=90 ? "r" : p>=70 ? "o" : "g";
    function renderCap(k){
      const ref=capData[k]; if(!ref) return;
      document.getElementById("cap-sub").textContent=
        "기준: "+ref.label+" ("+ref.cutoff+") · 사용자별 스토리지 점유 / 쿼터 (사용률 높은 순)";
      document.getElementById("capGauges").innerHTML = ref.users.map(u=>{
        const p=u.used_pct;
        return '<div class="gauge"><div class="gl">'+
          '<span class="gu">'+u.user+'</span>'+
          '<span class="gv">'+u.used_gb+' / '+u.quota_gb+' GB · <b>'+p+'%</b></span></div>'+
          '<div class="gbar"><span class="'+capCls(p)+'" style="width:'+Math.min(100,p)+'%"></span></div></div>';
      }).join("");
    }
    async function loadCap(){
      try{ const d=await (await fetch("/api/stats/capacity")).json();
        capData={}; (d.references||[]).forEach(r=>capData[r.key]=r);
        renderCap(curCap);
      }catch(e){}
    }
    document.getElementById("cap-btns").addEventListener("click",e=>{
      const b=e.target.closest("button"); if(!b)return;
      curCap=b.dataset.k;
      document.querySelectorAll("#cap-btns button").forEach(x=>x.classList.toggle("active",x===b));
      renderCap(curCap);
    });

    loadUsage(); loadCap();
    setInterval(loadUsage,30000);
    setInterval(loadCap,30000);
  </script>

  <script src="/static/include.js"></script>
  <script src="/static/chat-widget.js"></script>
</body>
</html>
