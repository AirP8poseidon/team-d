<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사내 HPC 포털 - 모니터링</title>
<link rel="stylesheet" href="/static/common.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  /* 모니터링 전용 스타일 (목업 디자인 유지 — 네비/토큰은 common.css) */
  .wrap{max-width:1200px;margin:0 auto;padding:26px 22px 60px;}
  .page-head{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
  .page-head h1{margin:0;font-size:26px;}
  .page-head .upd{font-size:13px;color:var(--muted);}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:6px;animation:blink 1.6s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px;}
  .kpi{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:15px 18px;box-shadow:0 2px 8px rgba(15,23,42,.05);}
  .kpi .label{font-size:12.5px;color:var(--muted);margin-bottom:5px;}
  .kpi .value{font-size:25px;font-weight:700;}
  .kpi .value.green{color:var(--green);}
  .kpi .value.orange{color:var(--orange);}
  .kpi .value.blue{color:var(--blue);}
  .kpi .value.red{color:var(--red);}
  .sec-title{font-size:19px;font-weight:700;margin:30px 0 14px;}
  .nodes{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .node{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(15,23,42,.05);}
  .node .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .node .name{font-weight:700;font-size:15px;}
  .badge{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;color:#fff;}
  .badge.run{background:var(--green);}
  .badge.idle{background:var(--muted);}
  .badge.maint{background:var(--orange);}
  .gpu-tag{font-size:12px;color:var(--muted);margin-bottom:10px;}
  .metric{margin-bottom:8px;}
  .metric .ml{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:3px;}
  .bar{height:8px;background:#e8edf5;border-radius:6px;overflow:hidden;}
  .bar > span{display:block;height:100%;border-radius:6px;transition:width .6s ease;}
  .fill-cpu{background:var(--blue);}
  .fill-gpu{background:var(--green);}
  .fill-mem{background:var(--orange);}
  /* 현재 작업 맥락 (결정 3A) */
  .node-ctx{margin-top:10px;padding-top:9px;border-top:1px dashed var(--line);font-size:12px;color:var(--ink);}
  .node-ctx.empty{color:var(--muted);}
  .node-ctx .src{color:var(--muted);}
  /* 작업 맥락 등록 폼 (FR-M5/M7) */
  .reg-panel{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:0 2px 8px rgba(15,23,42,.05);margin-bottom:18px;}
  .reg-panel h3{margin:0 0 4px;font-size:16px;}
  .reg-panel .hint{margin:0 0 12px;font-size:12.5px;color:var(--muted);}
  .reg-form{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;}
  .reg-field{display:flex;flex-direction:column;gap:4px;}
  .reg-field label{font-size:12px;color:var(--muted);}
  .reg-field input,.reg-field select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:var(--ink);}
  .reg-field input{min-width:150px;}
  .reg-btn{background:var(--blue);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;}
  .reg-btn:hover{background:#163fb8;}
  .reg-note{font-size:13px;align-self:center;}
  .reg-note.ok{color:var(--green);}
  .reg-note.err{color:var(--red);}
  .panel{background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:0 2px 8px rgba(15,23,42,.05);overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  thead th{background:#eef2f9;text-align:left;padding:11px 14px;color:var(--navy);font-weight:700;border-bottom:1px solid var(--line);white-space:nowrap;}
  tbody td{padding:10px 14px;border-bottom:1px solid #eef1f6;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#f8fafc;}
  .st{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;color:#fff;}
  .st.run{background:var(--green);}
  .st.wait{background:var(--orange);}
  .chart-box{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 2px 8px rgba(15,23,42,.05);}
  .chart-box h3{margin:0 0 12px;font-size:16px;}
  @media(max-width:1000px){.nodes{grid-template-columns:repeat(2,1fr);}.kpi-row{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:560px){.nodes{grid-template-columns:1fr;}.kpi-row{grid-template-columns:1fr;}}
  .scroll-x{overflow-x:auto;}
</style>
</head>
<body>
  <!-- 공통 네비 (include.js 가 _nav.html 주입, 결정 4A) -->
  <div id="nav-placeholder"></div>

  <div class="wrap">
    <div class="page-head">
      <h1>HPC 클러스터 모니터링</h1>
      <div class="upd"><span class="dot"></span>실시간 갱신 중 · 마지막 갱신 <span id="upd-time">--:--:--</span></div>
    </div>

    <div class="kpi-row">
      <div class="kpi"><div class="label">전체 노드</div><div class="value" id="kpi-total">--</div></div>
      <div class="kpi"><div class="label">가동 / 유휴 / 점검</div><div class="value green"><span id="kpi-run">-</span> <span style="color:var(--muted)">/</span> <span style="color:var(--muted)" id="kpi-idle">-</span> <span style="color:var(--muted)">/</span> <span style="color:var(--orange)" id="kpi-maint">-</span></div></div>
      <div class="kpi"><div class="label">대기 / 실행 Job</div><div class="value blue"><span id="kpi-wait">-</span> <span style="color:var(--muted)">/</span> <span style="color:var(--green)" id="kpi-jrun">-</span></div></div>
      <div class="kpi"><div class="label">평균 CPU / GPU / MEM</div><div class="value orange"><span id="kpi-cpu">-</span>% <span style="color:var(--green);font-size:18px">G <span id="kpi-gpu">-</span>%</span> <span style="color:var(--orange);font-size:18px">M <span id="kpi-mem">-</span>%</span></div></div>
    </div>

    <h2 class="sec-title">작업 맥락 등록</h2>
    <div class="reg-panel">
      <h3>현재 작업 맥락 등록</h3>
      <p class="hint">스케줄러 큐에 안 잡히는 <code>mpirun</code> 직접 실행 등도 여기서 등록하면 노드 카드에 즉시 표시됩니다. (FR-M5/M7)</p>
      <form class="reg-form" id="reg-form">
        <div class="reg-field">
          <label for="reg-node">노드</label>
          <select id="reg-node">
            <option>node01</option><option>node02</option><option>node03</option><option>node04</option>
            <option>node05</option><option>node06</option><option>node07</option><option>node08</option>
          </select>
        </div>
        <div class="reg-field">
          <label for="reg-user">사용자</label>
          <input id="reg-user" type="text" placeholder="예: 김지훈" autocomplete="off" />
        </div>
        <div class="reg-field">
          <label for="reg-purpose">작업 목적</label>
          <input id="reg-purpose" type="text" placeholder="예: 딥러닝 모델 학습" autocomplete="off" />
        </div>
        <div class="reg-field">
          <label for="reg-eta">예상 종료(ETA)</label>
          <input id="reg-eta" type="text" placeholder="예: 18:00" autocomplete="off" />
        </div>
        <div class="reg-field">
          <label for="reg-source">출처</label>
          <select id="reg-source">
            <option value="manual" selected>manual</option>
            <option value="mpirun">mpirun</option>
            <option value="slurm">slurm</option>
            <option value="pbs">pbs</option>
          </select>
        </div>
        <button class="reg-btn" type="submit">등록</button>
        <span class="reg-note" id="reg-note"></span>
      </form>
    </div>

    <h2 class="sec-title">노드 상태</h2>
    <div class="nodes" id="node-grid"></div>

    <h2 class="sec-title">노드별 GPU 사용률</h2>
    <div class="chart-box">
      <h3>실시간 GPU 사용률 (%)</h3>
      <canvas id="gpuChart" height="110"></canvas>
    </div>

    <h2 class="sec-title">작업(Job) 큐</h2>
    <div class="panel scroll-x">
      <table>
        <thead>
          <tr>
            <th>JobID</th><th>사용자</th><th>노드</th><th>작업 목적</th><th>상태</th><th>경과시간</th>
          </tr>
        </thead>
        <tbody id="job-body"></tbody>
      </table>
    </div>
  </div>

  <script src="/static/include.js"></script>
  <script src="/static/chat-widget.js"></script>
  <script>
  (function(){
    "use strict";

    // ── 상태 정규화 (실제 API 값 기준) ──────────────────────────────────────
    // sinfo 샘플 값: alloc, idle  (maint/down/drain 등은 향후 대비해 매핑)
    var NODE_ST = {
      alloc:"run", allocated:"run", running:"run", mix:"run", mixed:"run",
      idle:"idle",
      maint:"maint", down:"maint", drain:"maint", draining:"maint",
      drng:"maint", fail:"maint", failed:"maint"
    };
    var NODE_LABEL = { run:"가동중", idle:"유휴", maint:"점검" };
    function normNodeStatus(s){
      return NODE_ST[String(s||"").toLowerCase().trim()] || "idle";
    }
    // squeue 샘플 값: RUNNING, PENDING
    function normJobStatus(s){
      var k = String(s||"").toUpperCase().trim();
      if (k === "RUNNING") return "run";
      if (k === "PENDING") return "wait";
      return "wait";
    }
    var JOB_LABEL = { run:"실행중", wait:"대기" };

    function num(v){ var n = Number(v); return isFinite(n) ? n : 0; }
    function esc(s){
      return String(s == null ? "" : s)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    }
    function setText(id, v){ var el = document.getElementById(id); if (el) el.textContent = v; }

    // ── 상태 ────────────────────────────────────────────────────────────────
    var nodesData = [];
    var jobsData  = [];
    var usageMap  = {};
    var gpuChart  = null;

    // ── 렌더: 노드 카드 (CPU=cpu, GPU 막대=gpu(사용률), MEM=mem, 태그=gpu_model) ──
    function metric(label, cls, val){
      var v = num(val);
      return '<div class="metric"><div class="ml"><span>'+label+'</span><span>'+v+'%</span></div>'+
             '<div class="bar"><span class="'+cls+'" style="width:'+v+'%"></span></div></div>';
    }
    function ctxLine(node){
      var u = usageMap[node];
      if (u){
        return '<div class="node-ctx">현재 작업: <span class="accent">'+esc(u.purpose)+'</span>'+
               ' · '+esc(u.user)+' · ~'+esc(u.eta || "-")+
               ' <span class="src">('+esc(u.source || "manual")+')</span></div>';
      }
      return '<div class="node-ctx empty">현재 작업 없음</div>';
    }
    function nodeCard(n){
      var st = normNodeStatus(n.status);
      return '<div class="node">'+
        '<div class="top">'+
          '<span class="name">'+esc(n.node)+'</span>'+
          '<span class="badge '+st+'">'+NODE_LABEL[st]+'</span>'+
        '</div>'+
        '<div class="gpu-tag">GPU: '+esc(n.gpu_model || "-")+'</div>'+
        metric("CPU","fill-cpu",n.cpu)+
        metric("GPU","fill-gpu",n.gpu)+
        metric("MEM","fill-mem",n.mem)+
        ctxLine(n.node)+
      '</div>';
    }
    function renderNodes(){
      document.getElementById("node-grid").innerHTML = nodesData.map(nodeCard).join("");
    }

    // ── 렌더: Job 큐 (id=job_id, t=elapsed, 상태 정규화) ─────────────────────
    function renderJobs(){
      document.getElementById("job-body").innerHTML = jobsData.map(function(j){
        var st = normJobStatus(j.status);
        return '<tr>'+
          '<td>'+esc(j.job_id)+'</td>'+
          '<td>'+esc(j.user)+'</td>'+
          '<td>'+esc(j.node)+'</td>'+
          '<td>'+esc(j.purpose)+'</td>'+
          '<td><span class="st '+st+'">'+JOB_LABEL[st]+'</span></td>'+
          '<td>'+esc(j.elapsed)+'</td>'+
        '</tr>';
      }).join("");
    }

    // ── 렌더: KPI (실데이터에서 계산) ───────────────────────────────────────
    function renderKpis(){
      var run=0, idle=0, maint=0;
      nodesData.forEach(function(n){
        var s = normNodeStatus(n.status);
        if (s === "run") run++; else if (s === "maint") maint++; else idle++;
      });
      var jrun=0, jwait=0;
      jobsData.forEach(function(j){
        if (normJobStatus(j.status) === "run") jrun++; else jwait++;
      });
      var running = nodesData.filter(function(n){ return normNodeStatus(n.status) === "run"; });
      function avg(k){
        if (!running.length) return 0;
        return Math.round(running.reduce(function(s,n){ return s + num(n[k]); }, 0) / running.length);
      }
      setText("kpi-total", nodesData.length);
      setText("kpi-run", run); setText("kpi-idle", idle); setText("kpi-maint", maint);
      setText("kpi-wait", jwait); setText("kpi-jrun", jrun);
      setText("kpi-cpu", avg("cpu")); setText("kpi-gpu", avg("gpu")); setText("kpi-mem", avg("mem"));
    }

    // ── 차트: labels=node, data=gpu 사용률 ──────────────────────────────────
    function buildChart(){
      if (typeof Chart === "undefined") return;
      var ctx = document.getElementById("gpuChart");
      gpuChart = new Chart(ctx, {
        type:"bar",
        data:{
          labels: nodesData.map(function(n){ return n.node; }),
          datasets:[{
            label:"GPU 사용률 %",
            data: nodesData.map(function(n){ return num(n.gpu); }),
            backgroundColor:"#047857",
            borderRadius:6
          }]
        },
        options:{
          responsive:true,
          plugins:{ legend:{ display:false } },
          scales:{ y:{ beginAtZero:true, max:100, ticks:{ callback:function(v){ return v+"%"; } } } }
        }
      });
    }
    function updateChart(){
      if (!gpuChart) { buildChart(); return; }
      gpuChart.data.labels = nodesData.map(function(n){ return n.node; });
      gpuChart.data.datasets[0].data = nodesData.map(function(n){ return num(n.gpu); });
      gpuChart.update("none");
    }

    // ── fetch helper ────────────────────────────────────────────────────────
    function fetchJson(url){
      return fetch(url).then(function(r){
        if (!r.ok) throw new Error(url + " HTTP " + r.status);
        return r.json();
      });
    }

    // ── 폴링 갱신 (FR-M6): nodes + jobs + usage/latest 를 ~3초마다 ──────────
    function refresh(){
      return Promise.all([
        fetchJson("/api/monitoring/nodes"),
        fetchJson("/api/monitoring/jobs"),
        fetchJson("/api/monitoring/usage/latest")
      ]).then(function(res){
        nodesData = res[0] || [];
        jobsData  = res[1] || [];
        usageMap  = {};
        (res[2] || []).forEach(function(u){ usageMap[u.node] = u; });
        renderNodes();
        renderJobs();
        renderKpis();
        updateChart();
        setText("upd-time", new Date().toTimeString().slice(0,8));
      }).catch(function(e){
        // 실패해도 루프 유지 + 직전 렌더 보존 (FR-M6)
        console.error("refresh 실패", e);
      });
    }

    // ── 등록 폼 (FR-M5/M7): POST 후 즉시 refresh ────────────────────────────
    function note(msg, isErr){
      var el = document.getElementById("reg-note");
      el.textContent = msg;
      el.className = "reg-note " + (isErr ? "err" : "ok");
    }
    document.getElementById("reg-form").addEventListener("submit", function(e){
      e.preventDefault();
      var body = {
        node:    document.getElementById("reg-node").value,
        user:    document.getElementById("reg-user").value.trim(),
        purpose: document.getElementById("reg-purpose").value.trim(),
        eta:     document.getElementById("reg-eta").value.trim(),
        source:  document.getElementById("reg-source").value
      };
      if (!body.user || !body.purpose){ note("사용자와 작업 목적을 입력하세요.", true); return; }
      fetch("/api/monitoring/usage", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(body)
      }).then(function(r){
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      }).then(function(){
        note("등록되었습니다. 카드에 즉시 반영됩니다.", false);
        document.getElementById("reg-user").value = "";
        document.getElementById("reg-purpose").value = "";
        document.getElementById("reg-eta").value = "";
        return refresh();
      }).catch(function(err){
        note("등록 실패: " + err.message, true);
      });
    });

    // ── 시작 ────────────────────────────────────────────────────────────────
    // 폴링: 직전 tick 완료 후 3초 뒤 다음 tick (느린 네트워크에서 호출 겹침 방지)
    (function loop(){
      refresh().then(function(){ setTimeout(loop, 3000); });
    })();
  })();
  </script>
</body>
</html>
