<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>사용량 통계 · 사내 HPC 포털</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  /* ── 공통 디자인 토큰 (DEV_BLUEPRINT §5) ── */
  :root{
    --bg:#f4f6fb; --paper:#ffffff; --ink:#172033; --muted:#64748b;
    --line:#d8dee9; --blue:#1d4ed8; --navy:#0f172a;
    --green:#047857; --orange:#b45309; --red:#b91c1c;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);line-height:1.5;
    font-family:"Malgun Gothic","Apple SD Gothic Neo",Arial,sans-serif;}
  a{text-decoration:none;}

  .nav{background:var(--navy);color:#fff;display:flex;align-items:center;
    justify-content:space-between;padding:0 22px;height:60px;position:sticky;top:0;z-index:50;
    box-shadow:0 2px 10px rgba(15,23,42,.18);}
  .nav .brand{font-weight:700;font-size:17px;}
  .nav .menu{display:flex;gap:6px;}
  .nav .menu a{padding:8px 14px;border-radius:8px;color:#cbd5e1;font-size:14px;transition:.15s;}
  .nav .menu a:hover{background:rgba(255,255,255,.1);color:#fff;}
  .nav .menu a.active{background:var(--blue);color:#fff;font-weight:600;}

  .wrap{max-width:1180px;margin:0 auto;padding:26px 22px 60px;}
  .page-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
  .page-head h1{margin:0;font-size:24px;}
  .updated{font-size:13px;color:var(--muted);}

  .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px;}
  .kpi{background:var(--paper);border:1px solid var(--line);border-radius:13px;
    padding:15px 18px;box-shadow:0 2px 8px rgba(15,23,42,.05);}
  .kpi .label{font-size:12.5px;color:var(--muted);margin-bottom:5px;}
  .kpi .value{font-size:25px;font-weight:700;}
  .kpi .value.blue{color:var(--blue);} .kpi .value.green{color:var(--green);}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .chart-box{background:var(--paper);border:1px solid var(--line);border-radius:14px;
    padding:18px;box-shadow:0 2px 8px rgba(15,23,42,.05);margin-bottom:16px;}
  .chart-box h3{margin:0 0 12px;font-size:16px;}
  .full{grid-column:1 / -1;}

  @media(max-width:880px){.grid2{grid-template-columns:1fr;}.kpi-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
  <nav class="nav">
    <div class="brand">사내 HPC 포털</div>
    <div class="menu">
      <a href="index.html">홈</a>
      <a href="monitoring.html">모니터링</a>
      <a href="wiki.html">정보공유</a>
      <a href="stats.html" class="active">사용량 통계</a>
      <a href="system.html">시스템 상태</a>
    </div>
  </nav>

  <div class="wrap">
    <div class="page-head">
      <h1>사용량 통계</h1>
      <div class="updated">GPU-hours 집계 · 30초 자동 갱신</div>
    </div>

    <div class="kpi-row">
      <div class="kpi"><div class="label">총 GPU-hours</div><div class="value blue" id="kpi-total">-</div></div>
      <div class="kpi"><div class="label">일평균 GPU-hours</div><div class="value" id="kpi-avg">-</div></div>
      <div class="kpi"><div class="label">최번일(최대 사용)</div><div class="value orange" id="kpi-peak">-</div></div>
      <div class="kpi"><div class="label">최다 사용자</div><div class="value green" id="kpi-top">-</div></div>
      <div class="kpi"><div class="label">활성 사용자</div><div class="value" id="kpi-users">-</div></div>
      <div class="kpi"><div class="label">사용 노드 수</div><div class="value" id="kpi-nodes">-</div></div>
    </div>

    <div class="chart-box full">
      <h3>일자별 GPU 사용량 추이</h3>
      <canvas id="trendChart" height="90"></canvas>
    </div>

    <div class="grid2">
      <div class="chart-box">
        <h3>노드별 GPU-hours</h3>
        <canvas id="nodeChart" height="150"></canvas>
      </div>
      <div class="chart-box">
        <h3>사용자별 사용량 순위</h3>
        <canvas id="userChart" height="150"></canvas>
      </div>
    </div>

    <div class="grid2">
      <div class="chart-box">
        <h3>사용자 사용량 비중</h3>
        <canvas id="shareChart" height="150"></canvas>
      </div>
      <div class="chart-box">
        <h3>노드별 사용자 구성</h3>
        <canvas id="stackChart" height="150"></canvas>
      </div>
    </div>
  </div>

  <script>
    const C = { blue:"#1d4ed8", green:"#047857", orange:"#b45309", navy:"#0f172a" };
    const PAL = ["#1d4ed8","#047857","#b45309","#7c3aed","#0891b2","#be123c","#15803d","#a16207"];
    let nodeChart=null, userChart=null, trendChart=null, shareChart=null, stackChart=null;

    function makeBar(ctx, labels, data, color, horizontal){
      return new Chart(ctx, {
        type:"bar",
        data:{ labels, datasets:[{ label:"GPU-hours", data, backgroundColor:color, borderRadius:6 }] },
        options:{ indexAxis: horizontal ? "y" : "x", responsive:true,
          plugins:{ legend:{ display:false } },
          scales:{ x:{ beginAtZero:true }, y:{ beginAtZero:true } } }
      });
    }
    function makeLine(ctx, labels, data){
      return new Chart(ctx, {
        type:"line",
        data:{ labels, datasets:[{ label:"GPU-hours", data, borderColor:C.blue,
          backgroundColor:"rgba(29,78,216,.12)", fill:true, tension:.3, pointRadius:3 }] },
        options:{ responsive:true, plugins:{ legend:{ display:false } },
          scales:{ y:{ beginAtZero:true } } }
      });
    }
    // 추가 통계: 사용자 비중 도넛
    function makeDoughnut(ctx, labels, data){
      return new Chart(ctx, {
        type:"doughnut",
        data:{ labels, datasets:[{ data, backgroundColor:PAL, borderColor:"#fff", borderWidth:2 }] },
        options:{ responsive:true, plugins:{ legend:{ position:"right" } } }
      });
    }
    // 추가 통계: 노드별 사용자 구성(스택 막대)
    function makeStacked(ctx, nodes, series){
      return new Chart(ctx, {
        type:"bar",
        data:{ labels:nodes, datasets: series.map((s,i)=>({
          label:s.user, data:s.data, backgroundColor:PAL[i % PAL.length] })) },
        options:{ responsive:true, plugins:{ legend:{ position:"bottom" } },
          scales:{ x:{ stacked:true }, y:{ stacked:true, beginAtZero:true } } }
      });
    }

    const setText = (id,v)=>{ document.getElementById(id).textContent = v; };

    async function load(){
      let d;
      try{ d = await (await fetch("/api/stats/usage")).json(); }
      catch(e){ return; }   // 서버 미연결 시 다음 갱신 대기
      const s = d.summary || {};

      // KPI (요약 보강)
      setText("kpi-total", Number(s.total ?? 0).toFixed(1));
      setText("kpi-avg",   Number(s.avgPerDay ?? 0).toFixed(1));
      setText("kpi-peak",  s.peakDay ? s.peakDay.slice(5) : "-");
      setText("kpi-top",   d.by_user.length ? d.by_user[0].user : "-");
      setText("kpi-users", s.activeUsers ?? 0);
      setText("kpi-nodes", s.activeNodes ?? 0);

      const nLabels=d.by_node.map(x=>x.node),   nData=d.by_node.map(x=>x.gpu_hours);
      const uLabels=d.by_user.map(x=>x.user),   uData=d.by_user.map(x=>x.gpu_hours);
      const tLabels=d.trend.map(x=>x.day.slice(5)), tData=d.trend.map(x=>x.gpu_hours);
      const stk = d.stacked || { nodes:[], series:[] };

      if(!nodeChart){
        nodeChart  = makeBar(document.getElementById("nodeChart"),  nLabels, nData, C.green, false);
        userChart  = makeBar(document.getElementById("userChart"),  uLabels, uData, C.orange, true);
        trendChart = makeLine(document.getElementById("trendChart"), tLabels, tData);
        shareChart = makeDoughnut(document.getElementById("shareChart"), uLabels, uData);
        stackChart = makeStacked(document.getElementById("stackChart"), stk.nodes, stk.series);
      }else{
        nodeChart.data.labels=nLabels;  nodeChart.data.datasets[0].data=nData;  nodeChart.update("none");
        userChart.data.labels=uLabels;  userChart.data.datasets[0].data=uData;  userChart.update("none");
        trendChart.data.labels=tLabels; trendChart.data.datasets[0].data=tData; trendChart.update("none");
        shareChart.data.labels=uLabels; shareChart.data.datasets[0].data=uData; shareChart.update("none");
        stackChart.data.labels=stk.nodes;
        stackChart.data.datasets=stk.series.map((x,i)=>({label:x.user,data:x.data,backgroundColor:PAL[i%PAL.length]}));
        stackChart.update("none");
      }
    }
    load();
    setInterval(load, 30000);   // 집계는 느슨하게 30초
  </script>

  <!-- 실시간 채팅 위젯(팀원1 소유) — 한 줄 로드만 -->
  <script src="/static/chat-widget.js"></script>
</body>
</html>
